name: khayr__tahajjud_reminder
description: "Khayr est une application mobile au design moderne et spirituel, conçue pour vous rappeler l'heure de Tahajjud avec des rappels inspirants, des Du'a authentiques et une interface apaisante."
publish_to: "none"
version: 1.0.0+7

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^15.1.2
  intl: 0.20.2
  shared_preferences: ^2.0.0
  flutter_local_notifications: ^19.5.0
  audioplayers: ^6.5.1
  timezone: ^0.10.1
  flutter_timezone: ^5.0.1
  geolocator: ^14.0.2
  adhan: ^2.0.0+1
  change_app_package_name: ^1.5.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/audio/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/Icons/logo_tahajjud.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0D0C1D"
  image: assets/Icons/logo_tahajjud_NoBG.png
  android_12:
    image: assets/Icons/logo_tahajjud_NoBG.png
    color: "#0D0C1D"
    icon_background_color: "#0D0C1D"
