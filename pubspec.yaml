name: khayr__tahajjud_reminder
description: "Khayr est une application mobile au design moderne et spirituel, conçue pour vous rappeler l'heure de Tahajjud avec des rappels inspirants, des Du'a authentiques et une interface apaisante."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^15.1.2
  intl: 0.20.2
  shared_preferences: ^2.0.0
  flutter_local_notifications: ^19.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true
