plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.aaddoune.khayr"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.aaddoune.khayr"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    // Java 17 + desugaring for flutter_local_notifications
    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
        }
    }
}

flutter {
    source = "../.."
}

// Copy Adhan MP3 into res/raw so notification sounds resolve (invalid_sound fix).
// Sources: project root Assets/audio/ or assets/audio/ (Flutter convention).
def flutterProjectRoot = rootProject.projectDir.parentFile
tasks.register("copyAdhanToRawResources") {
    doLast {
        def rawDir = file("${projectDir}/src/main/res/raw")
        rawDir.mkdirs()
        def dirs = [
            new File(flutterProjectRoot, "Assets/audio"),
            new File(flutterProjectRoot, "assets/audio"),
        ]
        dirs.each { dir ->
            if (dir.exists()) {
                copy {
                    from(dir)
                    into(rawDir)
                    include "adhan_1.mp3", "adhan_2.mp3"
                }
            }
        }
        if (!file("${rawDir}/adhan_1.mp3").exists()) {
            logger.lifecycle("Khayr: WARNING — adhan_1.mp3 not in res/raw. Add MP3 to Assets/audio/ or android/app/src/main/res/raw/")
        }
    }
}

afterEvaluate {
    tasks.matching { it.name.startsWith("pre") && it.name.endsWith("Build") }.configureEach {
        it.dependsOn("copyAdhanToRawResources")
    }
}

dependencies {
    // Desugaring support for Java 8+ APIs (required by flutter_local_notifications)
    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")
}
